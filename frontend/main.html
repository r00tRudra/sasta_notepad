<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sasta Notepad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen bg-ink text-slate-100 overflow-hidden">
    <div class="page-noise"></div>
    <div class="orb orb-one"></div>
    <div class="orb orb-two"></div>

    <div class="relative z-10 flex h-screen">

      <!-- ── SIDEBAR: Folders ── -->
      <aside class="sidebar flex flex-col w-64 shrink-0 border-r border-white/10 bg-white/5 backdrop-blur-xl">

        <div class="px-5 pt-6 pb-4 border-b border-white/10">
          <div class="flex items-center gap-3">
            <div class="avatar"><span id="avatar-letter">U</span></div>
            <div>
              <p class="text-sm font-semibold text-slate-100" id="sidebar-username">User</p>
              <p class="text-xs text-slate-400">Personal workspace</p>
            </div>
          </div>
        </div>

        <div class="flex items-center justify-between px-5 pt-5 pb-2">
          <span class="text-xs font-semibold uppercase tracking-widest text-slate-400">Folders</span>
          <button id="new-folder-btn" class="icon-btn" title="New folder">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>

        <nav id="folder-list" class="flex-1 overflow-y-auto px-3 pb-4 space-y-0.5 scrollbar-thin"></nav>

        <div class="border-t border-white/10 px-5 py-4">
          <button id="logout-button" class="w-full text-left text-xs text-slate-400 hover:text-rose-300 transition-colors flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign out
          </button>
        </div>
      </aside>

      <!-- ── NOTES LIST ── -->
      <div class="flex flex-col w-60 shrink-0 border-r border-white/10 bg-black/10 backdrop-blur-xl">
        <div class="flex items-center justify-between px-5 pt-6 pb-4 border-b border-white/10">
          <h2 id="folder-title" class="text-sm font-semibold text-slate-200 truncate">Select a folder</h2>
          <button id="new-note-btn" class="icon-btn hidden" title="New note">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div id="notes-list" class="flex-1 overflow-y-auto px-3 py-3 space-y-1 scrollbar-thin">
          <p class="text-xs text-slate-500 px-2 pt-2">No folder selected.</p>
        </div>
      </div>

      <!-- ── MAIN EDITOR AREA ── -->
      <main class="flex-1 flex flex-col overflow-hidden">

        <!-- Empty state -->
        <div id="empty-state" class="flex flex-1 flex-col items-center justify-center gap-3 text-center px-8">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-600 mb-2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <p class="text-slate-500 text-sm">Pick a folder and open a note,<br/>or hit <span class="text-slate-300">+</span> to create one.</p>
        </div>

        <!-- Note workspace -->
        <div id="note-workspace" class="hidden flex-1 flex flex-col overflow-hidden">

          <!-- Toolbar -->
          <div class="flex items-center justify-between px-8 py-3 border-b border-white/10 shrink-0">
            <div class="flex items-center gap-3">
              <div class="mode-toggle">
                <button id="btn-write" class="mode-btn active">Write</button>
                <button id="btn-preview" class="mode-btn">Preview</button>
              </div>
              <span id="save-indicator" class="text-xs text-slate-500 transition-opacity opacity-0">Unsaved changes</span>
            </div>
            <div class="flex items-center gap-2">
              <button id="save-btn" class="pill-btn-primary opacity-40 cursor-not-allowed" disabled>Save</button>
              <button id="delete-note-btn" class="pill-btn !text-rose-300 !border-rose-300/20 hover:!bg-rose-300/10">Delete</button>
            </div>
          </div>

          <!-- Note title -->
          <div class="px-8 pt-6 pb-0 shrink-0 border-b border-white/5">
            <input
              id="note-title-input"
              type="text"
              placeholder="Untitled note…"
              class="note-title-input w-full"
              maxlength="120"
            />
            <p id="note-meta" class="text-xs text-slate-500 pb-3 mt-1"></p>
          </div>

          <!-- Write mode: raw textarea -->
          <div id="write-panel" class="flex-1 flex overflow-hidden">
            <textarea
              id="note-editor"
              spellcheck="true"
              placeholder="Start writing… markdown is fully supported.

# Heading 1
## Heading 2

**bold text**, *italic text*, `inline code`

\`\`\`python
def hello():
    print('Hello world')
\`\`\`

> A blockquote

- item one
- item two

---"
              class="note-editor flex-1 w-full resize-none scrollbar-thin px-8 py-5"
            ></textarea>
          </div>

          <!-- Preview mode: rendered markdown -->
          <div id="preview-panel" class="hidden flex-1 overflow-y-auto px-8 py-6 scrollbar-thin">
            <div id="preview-content" class="prose-note max-w-3xl"></div>
          </div>

        </div>
      </main>
    </div>

    <!-- MODAL: New Folder -->
    <div id="folder-modal" class="modal-backdrop hidden">
      <div class="modal-box">
        <h3 class="text-sm font-semibold text-slate-100 mb-4">New Folder</h3>
        <input id="folder-name-input" type="text" placeholder="Folder name…" class="modal-input" maxlength="60" />
        <div class="flex justify-end gap-2 mt-4">
          <button id="folder-cancel-btn" class="pill-btn">Cancel</button>
          <button id="folder-confirm-btn" class="pill-btn-primary">Create</button>
        </div>
      </div>
    </div>

    <!-- MODAL: New Note — title only, content goes in the editor -->
    <div id="note-modal" class="modal-backdrop hidden">
      <div class="modal-box">
        <h3 class="text-sm font-semibold text-slate-100 mb-1">New Note</h3>
        <p class="text-xs text-slate-400 mb-4">You'll write the content in the editor.</p>
        <input id="new-note-title-input" type="text" placeholder="Give it a title…" class="modal-input" maxlength="120" />
        <div class="flex justify-end gap-2 mt-4">
          <button id="note-cancel-btn" class="pill-btn">Cancel</button>
          <button id="note-confirm-btn" class="pill-btn-primary">Create & Open</button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast hidden"></div>

    <script src="main.js"></script>
  </body>
</html>
